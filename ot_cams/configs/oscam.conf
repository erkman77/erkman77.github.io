# Config created by OSCam-Installer Icam-Multitool

[global]
logfile                       = /tmp/oscam.log
clienttimeout                 = 7000
nice                          = -20
maxlogsize                    = 1000
preferlocalcards              = 1
block_same_ip                 = 0
block_same_name               = 0
emmlogdir                     = /etc/tuxbox/config/
disablecrccws_only_for        = 0500:030B00;1819:00006D;098D:000000;098C:000000;09C4:000000;092B:000000;1884:000000;1841:000000;1813:000068;0B01:000000

[streamrelay]
stream_relay_enabled          = 1
stream_relay_buffer_time      = 500
stream_relay_ctab             = 098C,098D,09C4


[dvbapi]
enabled                       = 1
au                            = 1
pmt_mode                      = 0
delayer                       = 60
ecminfo_type                  = 1
user                          = dvbapiau
read_sdt                      = 1
write_sdt_prov                = 1
boxtype                       = dreambox

[webif]
httpport                      = 8081
httprefresh                   = 20
httpallowed                   = 127.0.0.1,192.168.0.0-192.168.255.255,10.0.0.0-10.255.255.255
http_status_log               = 1
